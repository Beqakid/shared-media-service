#:schema node_modules/wrangler/config-schema.json

name = "shared-media-service"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "sms-db"
database_id = "318fb945-ae1e-47e1-9be8-ef0001877244"

[env.dev]
name = "shared-media-service-dev"

[env.dev.vars]
ENVIRONMENT = "development"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "sms-db-dev"
database_id = "<YOUR_DEV_D1_DATABASE_ID>"
